{% extends 'base.html' %}

{% block title %}Create account{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="card auth-card">
        <p class="eyebrow">Start analyzing</p>
        <h1>Create account</h1>
        <form method="post" class="form-stack">
            {{ form.hidden_tag() }}
            <label>
                <span>Username</span>
                {{ form.username(class_='input-field', placeholder='Choose a username') }}
                {% for error in form.username.errors %}<small class="error-text">{{ error }}</small>{% endfor %}
            </label>
            <label>
                <span>Email</span>
                {{ form.email(class_='input-field', placeholder='you@example.com') }}
                {% for error in form.email.errors %}<small class="error-text">{{ error }}</small>{% endfor %}
            </label>
            <label>
                <span>Password</span>
                {{ form.password(class_='input-field', placeholder='At least 8 characters') }}
                {% for error in form.password.errors %}<small class="error-text">{{ error }}</small>{% endfor %}
            </label>
            <label>
                <span>Confirm Password</span>
                {{ form.confirm_password(class_='input-field', placeholder='Repeat your password') }}
                {% for error in form.confirm_password.errors %}<small class="error-text">{{ error }}</small>{% endfor %}
            </label>
            {{ form.submit(class_='button button-primary full-width') }}
        </form>
    </div>
</section>
{% endblock %}
