{% extends 'base.html' %}

{% block title %}Log in{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="card auth-card">
        <p class="eyebrow">Secure access</p>
        <h1>Log in</h1>
        <form method="post" class="form-stack">
            {{ form.hidden_tag() }}
            <label>
                <span>Email</span>
                {{ form.email(class_='input-field', placeholder='you@example.com') }}
                {% for error in form.email.errors %}<small class="error-text">{{ error }}</small>{% endfor %}
            </label>
            <label>
                <span>Password</span>
                {{ form.password(class_='input-field', placeholder='Enter your password') }}
                {% for error in form.password.errors %}<small class="error-text">{{ error }}</small>{% endfor %}
            </label>
            {{ form.submit(class_='button button-primary full-width') }}
        </form>
    </div>
</section>
{% endblock %}
